server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: dujiangyan-game-server

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/dujiangyan_game?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    # url: jdbc:postgresql://localhost:5432/dujiangyan_game
    username: ${DB_USER:game_user}
    password: ${DB_PASS:game_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.dujiangyan.game: INFO
